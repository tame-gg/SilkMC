name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure git identity
        run: git config --global user.email "actions@github.com" && git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace

      - name: Build release artifacts
        run: ./gradlew build :silkmc-server:createPaperclipJar --stacktrace

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            silkmc-server/build/libs/silkmc-paperclip-*.jar
            silkmc-server/build/libs/silkmc-bundler-*.jar
            silkmc-server/build/libs/silkmc-server-*.jar
          body_path: docs/releases/v0.1.4-alpha.md
