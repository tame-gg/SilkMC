name: Build

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "upstream/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure git identity
        run: git config --global user.email "actions@github.com" && git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Build runnable server jar
        run: ./gradlew :silkmc-server:createPaperclipJar --stacktrace

      - name: Upload jars
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: silkmc-build
          path: |
            silkmc-server/build/libs/silkmc-paperclip-*.jar
            silkmc-server/build/libs/silkmc-bundler-*.jar
            silkmc-server/build/libs/*.jar
