name: Performance Problem
description: Report performance regressions, scheduler stalls, or compatibility overhead.
labels: [ "status: needs triage", "type: performance" ]
body:
  - type: input
    attributes:
      label: Profile link
      placeholder: https://spark.lucko.me/abcdefg12h
      description: Prefer a profiler link over screenshots.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Workload description
      description: Player count, plugin mix, world type, and what changed.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Config excerpts
      description: Include relevant SilkMC, Bukkit, Spigot, Paper, and server properties configuration.
    validations:
      required: true
  - type: textarea
    attributes:
      label: SilkMC version
      description: Paste the full `/version` output.
    validations:
      required: true
