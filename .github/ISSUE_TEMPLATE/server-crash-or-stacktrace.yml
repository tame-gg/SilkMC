name: Crash or Stacktrace
description: Report crashes, thread violations, or severe startup failures.
labels: [ "status: needs triage", "type: crash" ]
body:
  - type: textarea
    attributes:
      label: Stacktrace
      value: |
        ```
        paste crash or stacktrace here
        ```
    validations:
      required: true
  - type: textarea
    attributes:
      label: Plugins and datapacks
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actions to reproduce
    validations:
      required: false
  - type: textarea
    attributes:
      label: SilkMC version
      description: Paste the full `/version` output.
    validations:
      required: true
