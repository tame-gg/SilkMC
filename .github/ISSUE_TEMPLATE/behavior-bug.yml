name: Vanilla or Behavior Bug
description: Report vanilla behavior regressions or multithreaded gameplay issues in SilkMC.
labels: [ "status: needs triage", "type: bug" ]
body:
  - type: textarea
    attributes:
      label: Expected behavior
      description: What should have happened.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behavior
      description: What happened instead.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
      description: Include a world seed, schematic, commands, or video if helpful.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Plugins and datapacks
      description: Include all active plugins and datapacks.
    validations:
      required: true
  - type: textarea
    attributes:
      label: SilkMC version
      description: Paste the full `/version` output.
      value: |
        ```
        > version
        [10:00:11 INFO]: Checking version, please wait...
        [10:00:12 INFO]: This server is running SilkMC version git-SilkMC-"abcdef0" (MC: 26.1.2) (Implementing API version 26.1.2-R0.1-SNAPSHOT)
        ```
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Please confirm:

        1. You are on the latest SilkMC build for your Minecraft version.
        2. You checked for an existing report.
        3. You can reproduce without unrelated experimental mods if applicable.
